    <title>加入會員</title>
    <link rel="stylesheet" href="fontawesome-free-6.1.1-web/css/all.min.css">

        integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            background: url("https://picsum.photos/1440/1440?random1") no-repeat center center / cover;
            justify-content: center;
            align-items: center;
        }

        .login {
            width: 75%;
            background-color: rgba(0, 0, 0, .5);
            border-radius: 10px;
            border: 3px solid #fff;
            box-shadow: 0 0 50px #000;
            backdrop-filter: blur(3px);
            /* 讓裡面範圍模糊 */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
            box-sizing: border-box;
        }

        .form {
            font-family: Arial, Helvetica, sans-serif;
            color: #fff;
            height: 500px;
        }

        .form h2 {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #fff;
        }

        .form .group {
            margin-bottom: 20px;
        }

        .form h2 label {
            line-height: 2;
        }

        .form input {
            width: 100%;
            /*上下排列*/
            border: 1px solid #aaa;
            line-height: 3;
            border-radius: 5px;
        }

        .form .btn-group {
            margin-top: 50px;
            font-size: 0;
            /*兩個button中間的空格拿掉*/
        }

        .form .btn {
            font-size: 20px;
            border-radius: 5px;
            border: none;
            background-color: rgb(153, 153, 220);
            width: 190px;
            padding: 10px 0;
        }

        .form .btn+.btn {
            margin-left: 20px;
        }
    </style>
</head>

<body>
    <div class="login">
        <form class="row g-3 w-75 " name="myForm">
            <div class="col-md-4 ">
                <label for="name" class="form-label">姓名</label>
                <input type="text" class="form-control" id="name" value="Mark" required>
            </div>
            <div class="col-md-4" >
                <label for="email" class="form-label">帳號</label>
                <div class="input-group login-form">
                    <span class="input-group-text" id="inputGroupPrepend2">email</span>
                    <input type="email" name="email" class="form-control" id="accoutInput" aria-describedby="inputGroupPrepend2"
                        required>
                </div>
            </div>
            <div class="col-md-4 login-form">
                <label for="passwordInput" class="form-label">密碼</label>
                <input type="password" class="form-control" id="passwordInput" value="6~12英數字混合" required>
            </div>
            <div class="col-md-6">
                <label for="address" class="form-label">地址</label>
                <input type="text" class="form-control" id="address" required>
            </div>
            <div class="col-md-3">
                <label for="gender" class="form-label">性別</label>
                <select class="form-select" id="gender" required>
                    <option selected disabled value="">選擇</option>
                    <option>男</option>
                    <option>女</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="phonenumber" class="form-label">手機號碼</label>
                <input type="phonenumber" class="form-control" id="validationDefault05" required>
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="invalidCheck2">
                    <label class="form-check-label" for="invalidCheck2">
                        訂閱電子報
                    </label>
                </div>
            </div>
            <div class="col-12">
                <button class="btn btn-primary" type="submit">加入
                    <link rel="stylesheet" href="./加入會員.html">
                </button>
            </div>
        </form>
    </div>
