<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
        integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>店家資訊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            list-style: none;
            font-family: Arial, Helvetica, sans-serif;
            text-decoration: none;
        }

        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            background-color: #FBE0C3;
        }

        .wrap {
            width: 1200px;
            display: flex;
            margin: auto;
        }

        .item {
            width: 370px;
            margin: 15px;
            text-align: center;
            background-color: #fff;
            border: 1px solid rgb(251, 198, 100);
            box-shadow: 4px 4px rgba(244, 130, 1, 0.2);
            transform: translateY(0px);
            transition: .5s;
        }

        .item img {
            width: 100%;
            height: 500px;
            vertical-align: middle;
            overflow: cover;
        }

        .item h2 {
            border-bottom: 1px solid #888;
            padding-bottom: .3em;
            margin-bottom: .4em;
            font-weight: 700;
            color: rgb(0, 0, 0);
        }

        .item p {
            line-height: 1.6;
            font-weight: 300;
            color: #888;
        }

        .item .text {
            padding: 20px;
        }

        .item .txt:before {
            content: '';
            width: 0;
            height: 0;
            position: relative;
            border-top: 50px solid transparent;
            border-left: 184px solid #fff;
            border-right: 184px solid #fff;
            transform: translateY(-100%);
        }

        .item:hover {
            transform: translateY(-30px);
        }

        .item:hover .txt:before {
            border-left: 184px solid #E59A59;
            border-right: 184px solid #E59A59;
        }

        /*換色*/
        .item:hover .txt {
            background-image: linear-gradient(0deg, #FFBB98, #E59A59);
        }

        .item:hover h2 {
            color: #fff;
            border-bottom-color: #fff;
        }

        .item:hover p {
            color: #fff;
        }

        .fixed {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 48px;
            text-decoration: none;
        }

        @media screen and (max-width:768px) {
            .wrap {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
            }
        }
    </style>
</head>

<body>


    <div class="wrap">
        <div class="item"><img src="./img/30 (1).jpg" alt="">
            <a href="">
                <div class="txt">
                    <h2>台北店</h2>
                    <p>地址:臺北市松山區八德路三段112號 <br>
                        電話:(02)2869-0487 <br>
                        營業時間:11:00-21:30
                    </p>
                </div>
            </a>

        </div>
        <div class="item"><img src="./img/30 (2).jpg" alt="">
            <a href="">
                <div class="txt">
                    <h2>台中店</h2>
                    <p>地址:臺中市南屯區嶺東路333號1樓<br>
                        電話:(04)2396-8704 <br>
                        營業時間:11:00-21:30
                    </p>
                </div>
            </a>

        </div>
        <div class="item"><img src="./img/30 (3).jpg" alt="">
            <a href="">
                <div class="txt">
                    <h2>台南店</h2>
                    <p>地址:臺南市東區東寧路264號<br>
                        電話:(06)239-9487 <br>
                        營業時間:11:00-21:30

                    </p>
                </div>
            </a>

        </div>
    </div>
    <div class="fixed">
        <a href="./主頁.html"><i class="fa-solid fa-house" style="color: rgb(255,120,36);"></i></a>
    </div>


</body>

</html>
